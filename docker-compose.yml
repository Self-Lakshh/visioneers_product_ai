# =============================================================================
# Visioneers Product AI — Docker Compose (Development)
# =============================================================================
# Usage:
#   cp .env.example .env   (fill in secrets)
#   docker compose up --build
# =============================================================================

version: "3.9"

x-common-env: &common-env
  env_file:
    - .env

services:
  # ---------------------------------------------------------------------------
  # Backend — FastAPI
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: visioneers_backend
    <<: *common-env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app                 # Hot-reload during development
      - /app/__pycache__               # Exclude pycache from bind mount
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - visioneers_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ---------------------------------------------------------------------------
  # Frontend — Vite (React / Vue)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: visioneers_frontend
    env_file:
      - .env                            # Only VITE_* vars reach the browser
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app                # Hot-reload via Vite HMR
      - /app/node_modules              # Preserve container node_modules
    depends_on:
      - backend
    networks:
      - visioneers_net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis — Cache Layer
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: visioneers_redis
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-}
      --save 60 1
      --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - visioneers_net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

# =============================================================================
# Networks & Volumes
# =============================================================================
networks:
  visioneers_net:
    driver: bridge

volumes:
  redis_data:
    driver: local
